services:
  postgres:
    image: postgres:16
    container_name: gastosclaros-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: gastos_user
      POSTGRES_PASSWORD: gastos_pass
      POSTGRES_DB: gastosclaros
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - gastosclaros-net

  redis:
    image: redis:7
    container_name: gastosclaros-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - gastosclaros-net

  rabbitmq:
    image: rabbitmq:3-management
    container_name: gastosclaros-rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - gastosclaros-net
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend-core:
    build:
      context: ./backend-core/BackendCore.Api
      dockerfile: Dockerfile
    container_name: gastosclaros-backend-core
    restart: unless-stopped
    ports:
      - "5035:8080"
    environment:
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=gastosclaros;Username=gastos_user;Password=gastos_pass
      - ConnectionStrings__Redis=redis:6379
      - RabbitMQ__HostName=rabbitmq
      - RabbitMQ__Port=5672
      - RabbitMQ__UserName=guest
      - RabbitMQ__Password=guest
      - ModuloPago__BaseUrl=http://host.docker.internal:7071
    depends_on:
      postgres:
        condition: service_started
      redis:
        condition: service_started
      rabbitmq:
        condition: service_healthy
    networks:
      - gastosclaros-net

  modulo-categoria:
    build:
      context: ./modulo-categoria/ModuloCategoria.Worker
      dockerfile: Dockerfile
    container_name: gastosclaros-modulo-categoria
    restart: unless-stopped
    environment:
      - RabbitMQ__HostName=rabbitmq
      - RabbitMQ__Port=5672
      - RabbitMQ__UserName=guest
      - RabbitMQ__Password=guest
      - BackendCore__BaseUrl=http://backend-core:8080
    depends_on:
      rabbitmq:
        condition: service_healthy
      backend-core:
        condition: service_started
    networks:
      - gastosclaros-net

  frontend-web:
    build:
      context: ./frontend-web/FrontendWeb
      dockerfile: Dockerfile
    container_name: gastosclaros-frontend-web
    restart: unless-stopped
    ports:
      - "5005:8080"
    environment:
      - BackendCore__BaseUrl=http://backend-core:8080
    depends_on:
      - backend-core
    networks:
      - gastosclaros-net

volumes:
  postgres-data:

networks:
  gastosclaros-net:
    driver: bridge
